services:
  - type: web
    name: intern-product-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false        # set manually in Render dashboard
      - key: DIRECT_URL
        sync: false        # set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false        # set manually in Render dashboard
